<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ugliest Website Ever</title>

<style>

* {
  box-sizing: border-box;
  margin: 20px;
  padding: 15px;
  border: 5px dashed hotpink;
  font-family: Comic Sans MS, cursive;
}

/* BODY MADNESS */
body {
  background: linear-gradient(45deg, red, lime, blue, yellow);
  overflow-x: hidden;
}

/* ELEMENT + CLASS + ID SELECTORS */
div.container {
  background: orange;
  position: relative;
}

/* CHILD SELECTOR */
.container > p {
  color: white;
  background: black;
}

/* ADJACENT SIBLING */
h1 + p {
  transform: rotate(5deg);
}

/* GENERAL SIBLING */
h1 ~ span {
  font-size: 40px;
  color: purple;
}

/* ID SELECTOR */
#mainTitle {
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%) rotate(10deg);
  background: cyan;
  z-index: 999;
}

/* FLOAT CHAOS */
.floaty {
  float: right;
  width: 200px;
  height: 200px;
  background: magenta;
}

/* FLEXBOX MISUSE */
.flexbox {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  flex-wrap: wrap;
  height: 300px;
  background: lime;
}

.flexbox div {
  flex-grow: 10;
  background: red;
  height: 50px;
}

/* POSITIONING MADNESS */
.absolute-box {
  position: absolute;
  top: 200px;
  left: 300px;
  background: yellow;
}

.relative-box {
  position: relative;
  top: 50px;
  left: -100px;
  background: purple;
}

/* STICKY RANDOMNESS */
.sticky {
  position: sticky;
  top: 100px;
  background: black;
  color: white;
}

/* PSEUDO CLASSES */
button:hover {
  background: black;
  color: yellow;
  transform: scale(2) rotate(20deg);
}

/* NTH CHILD CHAOS */
li:nth-child(odd) {
  background: cyan;
  font-size: 25px;
}

li:nth-child(even) {
  background: pink;
  transform: rotate(-10deg);
}

/* PSEUDO ELEMENTS */
h2::before {
  content: "🔥🔥🔥 ";
}

h2::after {
  content: " 💀💀💀";
}

/* MEDIA QUERY DISASTER */
@media (max-width: 600px) {
  body {
    background: black;
  }

  * {
    transform: rotate(15deg);
  }

  .flexbox {
    flex-direction: column-reverse;
  }
}

</style>
</head>

<body>

<h1 id="mainTitle">WELCOME TO THE WORST WEBSITE</h1>

<div class="container">

  <p>This text makes no sense</p>
  <span>WHY IS THIS SO BIG</span>

  <div class="floaty">FLOAT???</div>

  <div class="flexbox">
    <div>1</div>
    <div>2</div>
    <div>3</div>
  </div>

  <div class="absolute-box">ABSOLUTE CHAOS</div>
  <div class="relative-box">RELATIVE CONFUSION</div>

  <div class="sticky">I STICK FOR NO REASON</div>

  <h2>Very Important Heading</h2>

  <ul>
    <li>Item ???</li>
    <li>Item ???</li>
    <li>Item ???</li>
    <li>Item ???</li>
  </ul>

  <button>DO NOT CLICK</button>

</div>

</body>
</html>
